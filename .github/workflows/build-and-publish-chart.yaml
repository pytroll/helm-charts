name: Build & Publish Single Helm Chart

on:
  workflow_run:
    workflows: ["Create Chart Release Tag"]
    types: [completed]

  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. segment-gatherer-0.3.1)"
        required: false
        type: string

  push:
    tags:
      - "*-*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine tag
        id: determine_tag
        run: |
          # 1. Manual trigger
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            echo "Using manual tag: $TAG"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 2. Tag push trigger
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "Using pushed tag: $TAG"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 3. workflow_run trigger → extract tag from the release
          TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
          echo "Using tag from release: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract chart name and version
        id: tag
        run: |
          TAG="${{ steps.determine_tag.outputs.tag }}"
          CHART_NAME="${TAG%-*}"
          VERSION="${TAG##*-}"
          echo "chart=$CHART_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package only the released chart
        run: |
          mkdir -p public
          helm package "charts/${{ steps.tag.outputs.chart }}" --destination public

      - name: Download existing Helm repo from GitHub Pages
        run: |
          mkdir -p existing
          curl -sfL "https://pytroll.github.io/pytroll-charts/index.yaml" -o existing/index.yaml || true
          cp -r existing/* public/ || true

      - name: Regenerate index.yaml including all versions
        run: |
          helm repo index public \
            --url https://pytroll.github.io/pytroll-charts \
            --merge public/index.yaml

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
